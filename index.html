<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRM | Tu Negocio En Las Redes</title>
<meta name="description" content="CRM Comercial - Tu Negocio En Las Redes" />
<meta name="theme-color" content="#0D2F73" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.47.10/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
/* ===================== VARIABLES & RESET ===================== */
:root{
  --brand-900:#081C45; --brand-800:#0D2F73; --brand-700:#1040A0; --brand-600:#1855C8;
  --brand-500:#2563EB; --brand-400:#3B82F6; --brand-100:#DBEAFE; --brand-50:#EFF6FF;
  --bg:#F5F5FA; --card:#FFFFFF; --border:#E5E7EB; --text:#111118; --muted:#6B6B8A;
  --green:#10B981; --amber:#F59E0B; --red:#EF4444; --purple:#8B5CF6; --cyan:#06B6D4;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.08),0 2px 4px -2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 25px -5px rgba(0,0,0,.12);
}
.dark{
  --bg:#0A0A0F; --card:#1C1C28; --border:#2A2A3A; --text:#F5F5FA; --muted:#9494B0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;
}
::-webkit-scrollbar{width:7px;height:7px;}
::-webkit-scrollbar-thumb{background:#c0c0d0;border-radius:10px;}
.dark ::-webkit-scrollbar-thumb{background:#3f3f55;}
a{color:inherit;text-decoration:none;}
button{font-family:inherit;cursor:pointer;border:none;background:none;}
input,select,textarea{font-family:inherit;}
.hidden{display:none !important;}

/* ===================== LOGIN ===================== */
#login{
  position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;
  background:linear-gradient(135deg,#081C45 0%,#0D2F73 55%,#1855C8 100%);overflow:hidden;
}
#login::before,#login::after{content:'';position:absolute;border-radius:50%;filter:blur(80px);}
#login::before{width:380px;height:380px;background:rgba(59,130,246,.25);top:-120px;right:-80px;}
#login::after{width:380px;height:380px;background:rgba(37,99,235,.15);bottom:-120px;left:-80px;}
.login-card{position:relative;width:100%;max-width:400px;animation:fadeUp .5s ease;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo .badge-logo{display:inline-flex;width:64px;height:64px;border-radius:18px;background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.2);align-items:center;justify-content:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:14px;}
.login-logo h1{color:#fff;font-size:22px;font-weight:700;}
.login-logo p{color:#BFDBFE;font-size:13px;margin-top:4px;}
.login-box{background:rgba(255,255,255,.1);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.2);
  border-radius:20px;padding:32px;box-shadow:var(--shadow-lg);}
.login-box h2{color:#fff;font-size:18px;margin-bottom:22px;}
.login-box label{display:block;color:#DBEAFE;font-size:13px;font-weight:500;margin-bottom:6px;}
.login-box .field{margin-bottom:16px;}
.login-box input{width:100%;padding:11px 14px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);
  border-radius:10px;color:#fff;font-size:14px;outline:none;transition:.2s;}
.login-box input::placeholder{color:rgba(255,255,255,.45);}
.login-box input:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.15);}
.login-box .btn-login{width:100%;padding:12px;background:#fff;color:var(--brand-900);font-weight:700;font-size:14px;
  border-radius:10px;margin-top:6px;transition:.2s;}
.login-box .btn-login:hover{background:#EFF6FF;transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.2);}
.login-hint{text-align:center;color:rgba(191,219,254,.6);font-size:11px;margin-top:18px;line-height:1.7;}
.login-error{color:#FCA5A5;font-size:12px;margin-top:8px;text-align:center;min-height:16px;}

/* ===================== APP LAYOUT ===================== */
#app{display:flex;min-height:100vh;}
.sidebar{width:240px;background:var(--card);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;
  display:flex;flex-direction:column;z-index:40;transition:transform .3s;}
.sidebar-head{display:flex;align-items:center;gap:12px;padding:18px 16px;border-bottom:1px solid var(--border);}
.sidebar-head .logo{width:38px;height:38px;border-radius:12px;background:var(--brand-800);display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;box-shadow:var(--shadow-md);flex-shrink:0;}
.sidebar-head h1{font-size:14px;font-weight:700;line-height:1.2;}
.sidebar-head p{font-size:11px;color:var(--muted);}
.nav{flex:1;padding:14px 12px;overflow-y:auto;}
.nav a{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:14px;font-weight:500;
  color:var(--muted);margin-bottom:3px;transition:.18s;}
.nav a:hover{background:var(--bg);color:var(--text);}
.nav a.active{background:var(--brand-800);color:#fff;}
.nav a svg{width:18px;height:18px;flex-shrink:0;}
.sidebar-foot{padding:14px 12px;border-top:1px solid var(--border);}
.user-chip{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--brand-800);color:#fff;display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;}
.user-chip .info{min-width:0;}
.user-chip .info p:first-child{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-chip .info p:last-child{font-size:11px;color:var(--muted);text-transform:capitalize;}
.btn-logout{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:10px;color:var(--red);
  font-size:14px;font-weight:500;transition:.18s;}
.btn-logout:hover{background:rgba(239,68,68,.1);}

.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-width:0;}
.topbar{height:60px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;
  gap:14px;padding:0 18px;position:sticky;top:0;z-index:30;}
.menu-btn{display:none;}
.search-wrap{flex:1;max-width:440px;position:relative;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:16px;height:16px;color:var(--muted);}
.search-wrap input{width:100%;padding:9px 14px 9px 36px;background:var(--bg);border:1px solid var(--border);border-radius:10px;
  font-size:14px;color:var(--text);outline:none;transition:.2s;}
.search-wrap input:focus{border-color:var(--brand-500);}
.search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);
  border-radius:12px;box-shadow:var(--shadow-lg);overflow:hidden;z-index:50;}
.search-results .item{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:.15s;}
.search-results .item:hover{background:var(--bg);}
.topbar-actions{margin-left:auto;display:flex;gap:6px;}
.icon-btn{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted);transition:.18s;}
.icon-btn:hover{background:var(--bg);color:var(--text);}
.icon-btn svg{width:18px;height:18px;}
.content{flex:1;padding:22px;overflow-x:hidden;}

/* ===================== COMPONENTS ===================== */
.page-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:22px;}
.page-head h2{font-size:23px;font-weight:700;}
.page-head .sub{font-size:13px;color:var(--muted);margin-top:3px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;font-size:14px;font-weight:600;transition:.18s;}
.btn svg{width:16px;height:16px;}
.btn-primary{background:var(--brand-800);color:#fff;box-shadow:var(--shadow);}
.btn-primary:hover{background:var(--brand-900);transform:translateY(-1px);box-shadow:var(--shadow-md);}
.btn-secondary{background:var(--card);color:var(--text);border:1px solid var(--border);}
.btn-secondary:hover{background:var(--bg);}
.btn-danger{background:var(--red);color:#fff;}
.btn-danger:hover{filter:brightness(.92);}
.btn-sm{padding:6px 12px;font-size:13px;}

.grid{display:grid;gap:16px;}
.kpi-grid{grid-template-columns:repeat(4,1fr);}
.stat{display:flex;gap:14px;align-items:flex-start;padding:18px;}
.stat .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat .ic svg{width:20px;height:20px;}
.stat .t{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.stat .v{font-size:23px;font-weight:800;margin-top:2px;}
.ic-blue{background:var(--brand-50);color:var(--brand-600);} .dark .ic-blue{background:rgba(37,99,235,.15);}
.ic-green{background:#ECFDF5;color:var(--green);} .dark .ic-green{background:rgba(16,185,129,.15);}
.ic-amber{background:#FFFBEB;color:var(--amber);} .dark .ic-amber{background:rgba(245,158,11,.15);}
.ic-red{background:#FEF2F2;color:var(--red);} .dark .ic-red{background:rgba(239,68,68,.15);}
.ic-purple{background:#F5F3FF;color:var(--purple);} .dark .ic-purple{background:rgba(139,92,246,.15);}
.ic-cyan{background:#ECFEFF;color:var(--cyan);} .dark .ic-cyan{background:rgba(6,182,212,.15);}

.chart-card{padding:18px;}
.chart-card h3{font-size:15px;font-weight:600;margin-bottom:14px;}
.chart-box{position:relative;height:230px;}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.b-gray{background:#F1F1F5;color:#555;} .dark .b-gray{background:#2A2A3A;color:#bbb;}
.b-orange{background:#FFEDD5;color:#C2410C;} .dark .b-orange{background:rgba(234,88,12,.2);color:#FDBA74;}
.b-yellow{background:#FEF9C3;color:#A16207;} .dark .b-yellow{background:rgba(202,138,4,.2);color:#FDE047;}
.b-blue{background:#DBEAFE;color:#1D4ED8;} .dark .b-blue{background:rgba(37,99,235,.2);color:#93C5FD;}
.b-purple{background:#EDE9FE;color:#6D28D9;} .dark .b-purple{background:rgba(139,92,246,.2);color:#C4B5FD;}
.b-indigo{background:#E0E7FF;color:#4338CA;} .dark .b-indigo{background:rgba(79,70,229,.2);color:#A5B4FC;}
.b-cyan{background:#CFFAFE;color:#0E7490;} .dark .b-cyan{background:rgba(6,182,212,.2);color:#67E8F9;}
.b-green{background:#D1FAE5;color:#047857;} .dark .b-green{background:rgba(16,185,129,.2);color:#6EE7B7;}
.b-red{background:#FEE2E2;color:#B91C1C;} .dark .b-red{background:rgba(239,68,68,.2);color:#FCA5A5;}

table{width:100%;border-collapse:collapse;font-size:14px;}
thead th{text-align:left;padding:12px 14px;font-size:12px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--border);white-space:nowrap;}
tbody td{padding:13px 14px;border-bottom:1px solid var(--border);}
tbody tr{cursor:pointer;transition:.15s;}
tbody tr:hover{background:var(--bg);}
tbody tr:last-child td{border-bottom:none;}
.cell-lead{display:flex;align-items:center;gap:10px;}
.empty{text-align:center;padding:50px 20px;color:var(--muted);}

/* FORM / MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(3px);z-index:90;display:flex;
  align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s;}
.modal{background:var(--card);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:640px;
  max-height:90vh;overflow-y:auto;animation:fadeUp .25s;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--card);z-index:5;}
.modal-head h3{font-size:17px;font-weight:700;}
.modal-body{padding:24px;}
.form-section-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid.full{grid-template-columns:1fr;}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text);margin-bottom:5px;}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);color:var(--text);font-size:14px;outline:none;transition:.18s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--brand-500);box-shadow:0 0 0 3px rgba(37,99,235,.12);}
.field textarea{resize:vertical;min-height:70px;}
.modal-foot{display:flex;gap:12px;margin-top:8px;}
.modal-foot .btn{flex:1;justify-content:center;}

/* PIPELINE */
.pipeline{display:flex;gap:12px;overflow-x:auto;padding-bottom:14px;}
.pcol{flex-shrink:0;width:260px;border-radius:14px;padding:12px;background:var(--bg);border:1px solid var(--border);}
.pcol-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.pcol-head h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;}
.pcol-head .money{font-size:10px;color:var(--muted);margin-top:2px;}
.pcol-count{width:22px;height:22px;border-radius:50%;background:var(--border);font-size:11px;font-weight:700;
  display:flex;align-items:center;justify-content:center;color:var(--muted);}
.pcol-body{min-height:120px;display:flex;flex-direction:column;gap:8px;}
.pcard{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:11px;box-shadow:var(--shadow);
  cursor:grab;transition:.15s;}
.pcard:hover{box-shadow:var(--shadow-md);}
.pcard.dragging{opacity:.4;}
.pcard .top{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.pcard .top .avatar{width:26px;height:26px;font-size:10px;}
.pcard .nm{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pcard .co{font-size:11px;color:var(--muted);}
.pcard .prod{font-size:10px;color:var(--brand-600);background:var(--brand-50);padding:2px 7px;border-radius:6px;display:inline-block;margin-bottom:4px;}
.dark .pcard .prod{background:rgba(37,99,235,.15);}
.pcard .amt{font-size:13px;font-weight:700;}
.pcol.drop-target{outline:2px dashed var(--brand-500);outline-offset:2px;}
.drop-empty{border:2px dashed var(--border);border-radius:10px;height:64px;display:flex;align-items:center;
  justify-content:center;font-size:11px;color:var(--muted);}

/* RANKING */
.rank-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.rank-card{padding:20px;border:2px solid transparent;}
.rank-card.r1{border-color:#FDE68A;background:linear-gradient(180deg,#FFFBEB,var(--card) 60%);}
.dark .rank-card.r1{background:linear-gradient(180deg,rgba(245,158,11,.12),var(--card) 60%);}
.rank-card.r2{border-color:#E5E7EB;}
.rank-card.r3{border-color:#FED7AA;}
.rank-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.rank-pos{font-size:30px;font-weight:900;}
.r1 .rank-pos{color:#F59E0B;} .r2 .rank-pos{color:#9CA3AF;} .r3 .rank-pos{color:#B45309;}
.rank-card h4{font-size:16px;font-weight:700;}
.rank-card .full{font-size:11px;color:var(--muted);margin-bottom:14px;}
.rank-mini{display:grid;grid-template-columns:1fr 1fr;gap:8px;text-align:center;}
.rank-mini .box{background:var(--bg);border-radius:10px;padding:8px;}
.rank-mini .box b{font-size:18px;font-weight:800;display:block;}
.rank-mini .box span{font-size:10px;color:var(--muted);}
.rank-fin{margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.rank-fin .lbl{font-size:11px;color:var(--muted);}
.rank-fin .val{font-size:15px;font-weight:700;}

.progress{height:8px;background:var(--border);border-radius:10px;overflow:hidden;}
.progress .bar{height:100%;border-radius:10px;transition:width .6s ease;}

.tabs{display:flex;border-bottom:1px solid var(--border);}
.tabs button{flex:1;padding:13px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:.18s;}
.tabs button.active{color:var(--brand-700);border-bottom-color:var(--brand-700);}
.dark .tabs button.active{color:var(--brand-400);border-bottom-color:var(--brand-400);}

.timeline-item{display:flex;gap:12px;}
.timeline-item .dot{width:30px;height:30px;border-radius:50%;background:var(--brand-50);color:var(--brand-600);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.dark .timeline-item .dot{background:rgba(37,99,235,.15);}
.timeline-item .dot svg{width:14px;height:14px;}
.timeline-item .line{width:2px;flex:1;background:var(--border);margin:4px auto;}
.timeline-item .body{padding-bottom:18px;}

.task-item{display:flex;align-items:center;gap:12px;padding:13px;border-radius:11px;border:1px solid var(--border);background:var(--card);transition:.15s;}
.task-item.done{opacity:.55;}
.task-check{width:22px;height:22px;flex-shrink:0;cursor:pointer;}
.task-check svg{width:22px;height:22px;}
.prio{font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600;}
.prio.alta{background:#FEE2E2;color:#B91C1C;} .prio.media{background:#FEF3C7;color:#B45309;} .prio.baja{background:#F1F1F5;color:#666;}

.toast{position:fixed;top:18px;right:18px;background:var(--brand-800);color:#fff;padding:13px 18px;border-radius:12px;
  box-shadow:var(--shadow-lg);font-size:14px;font-weight:500;z-index:200;animation:slideIn .3s;}

.filters{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;padding:16px;margin-bottom:16px;}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.anim{animation:fadeUp .35s ease both;}

/* NOTIFICACIONES */
.notif-wrap{position:relative;}
.notif-wrap .icon-btn{position:relative;}
.notif-badge{position:absolute;top:3px;right:3px;min-width:16px;height:16px;padding:0 4px;border-radius:8px;
  background:var(--red);color:#fff;font-size:10px;font-weight:700;line-height:16px;text-align:center;pointer-events:none;}
.notif-panel{position:absolute;top:46px;right:0;width:336px;max-width:90vw;background:var(--card);border:1px solid var(--border);
  border-radius:14px;box-shadow:var(--shadow-lg);z-index:120;overflow:hidden;animation:fadeUp .18s ease both;}
.notif-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border);}
.notif-head h4{font-size:14px;font-weight:700;}
.notif-clear{font-size:12px;color:var(--brand-500);font-weight:600;background:none;cursor:pointer;padding:4px 6px;border-radius:7px;}
.notif-clear:hover{background:var(--bg);}
.notif-list{max-height:64vh;overflow-y:auto;}
.notif-item{display:flex;gap:11px;padding:12px 15px;border-bottom:1px solid var(--border);align-items:flex-start;}
.notif-item:last-child{border-bottom:none;}
.ni-ico{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ni-ico svg{width:15px;height:15px;}
.notif-body{flex:1;min-width:0;cursor:pointer;}
.notif-body .nt{font-size:13px;font-weight:600;line-height:1.3;}
.notif-body .nd{font-size:11px;color:var(--muted);margin-top:2px;}
.notif-x{width:24px;height:24px;border-radius:7px;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.notif-x:hover{background:var(--bg);color:var(--red);}
.notif-x svg{width:14px;height:14px;}
.notif-empty{padding:34px 15px;text-align:center;color:var(--muted);font-size:13px;}
.notif-confirm{padding:14px 15px;border-bottom:1px solid var(--border);}
.notif-confirm p{font-size:13px;font-weight:600;line-height:1.4;margin-bottom:11px;}
.notif-confirm .row{display:flex;gap:8px;}
.notif-confirm button{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:600;transition:.15s;}
.nc-no{background:var(--bg);color:var(--text);border:1px solid var(--border);}
.nc-no:hover{background:var(--border);}
.nc-yes{background:var(--red);color:#fff;}
.nc-yes:hover{filter:brightness(.92);}

/* CALENDARIO */
.cal-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.cal-nav{display:flex;align-items:center;gap:4px;}
.cal-title{font-size:16px;font-weight:700;min-width:150px;text-align:center;text-transform:capitalize;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
.cal-dow{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.03em;text-align:center;padding:4px 0;}
.cal-cell{min-height:94px;border:1px solid var(--border);border-radius:10px;padding:6px;background:var(--card);
  cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
.cal-cell:hover{border-color:var(--brand-500);}
.cal-cell.other{opacity:.4;}
.cal-cell.today{border-color:var(--brand-500);box-shadow:inset 0 0 0 1px var(--brand-500);}
.cal-cell.sel{background:var(--brand-50);}
.dark .cal-cell.sel{background:rgba(37,99,235,.12);}
.cal-daynum{font-size:12px;font-weight:600;align-self:flex-end;}
.cal-cell.today .cal-daynum{background:var(--brand-800);color:#fff;border-radius:50%;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;}
.cal-evs{display:flex;flex-direction:column;gap:3px;min-width:0;}
.cal-ev{font-size:11px;line-height:1.3;padding:2px 6px;border-radius:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.cal-ev.alta{background:#FEE2E2;color:#B91C1C;} .dark .cal-ev.alta{background:rgba(239,68,68,.2);color:#FCA5A5;}
.cal-ev.media{background:#FEF3C7;color:#B45309;} .dark .cal-ev.media{background:rgba(245,158,11,.2);color:#FDE047;}
.cal-ev.baja{background:#E0E7FF;color:#4338CA;} .dark .cal-ev.baja{background:rgba(79,70,229,.2);color:#A5B4FC;}
.cal-ev.done{text-decoration:line-through;opacity:.55;}
.cal-more{font-size:10px;color:var(--muted);font-weight:600;padding-left:2px;}
.cal-dots{display:none;gap:3px;flex-wrap:wrap;}
.cal-dot{width:6px;height:6px;border-radius:50%;display:inline-block;}
.cal-dot.alta{background:var(--red);} .cal-dot.media{background:var(--amber);} .cal-dot.baja{background:var(--brand-500);}
.cal-agenda{margin-top:18px;}

/* ACCIONES TAREA -> CALENDARIO */
.cal-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;
  background:var(--brand-50);color:var(--brand-700);transition:.15s;white-space:nowrap;}
.dark .cal-tag{background:rgba(37,99,235,.15);color:var(--brand-400);}
.cal-tag:hover{background:var(--brand-100);} .dark .cal-tag:hover{background:rgba(37,99,235,.25);}
.cal-tag svg{width:14px;height:14px;flex-shrink:0;}
.cal-add{display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:8px;font-size:12px;font-weight:600;
  background:var(--bg);color:var(--muted);border:1px solid var(--border);transition:.15s;white-space:nowrap;}
.cal-add:hover{color:var(--brand-700);border-color:var(--brand-500);}
.cal-add svg{width:14px;height:14px;flex-shrink:0;}
.cal-rm{color:var(--muted);}
.cal-rm:hover{color:var(--red);background:var(--bg);}

/* RESPONSIVE */
@media(max-width:1024px){.kpi-grid{grid-template-columns:repeat(3,1fr);} .rank-grid{grid-template-columns:1fr;}}
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);} .sidebar.open{transform:translateX(0);box-shadow:var(--shadow-lg);}
  .main{margin-left:0;} .menu-btn{display:flex;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .two-col{grid-template-columns:1fr !important;}
  .form-grid{grid-template-columns:1fr;}
  .hide-sm{display:none;}
  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:35;}
}
@media(max-width:480px){.kpi-grid{grid-template-columns:1fr 1fr;} .content{padding:14px;}
  .notif-panel{position:fixed;top:62px;right:10px;left:10px;width:auto;max-width:none;}
}
@media(max-width:600px){
  .cal-add span,.cal-tag span{display:none;}
  .cal-add,.cal-tag{padding:7px;}
}
@media(max-width:640px){
  .cal-grid{gap:4px;}
  .cal-cell{min-height:52px;padding:4px;gap:2px;}
  .cal-evs,.cal-more{display:none;}
  .cal-dots{display:flex;}
  .cal-daynum{align-self:center;font-size:13px;}
  .cal-cell.today .cal-daynum{width:24px;height:24px;}
}

// -------- ESTADO --------

let charts = {};
let sb = null;          // cliente de Supabase
let realtimeOn = false;

function supaReady(){
  return typeof window.SUPABASE_URL==='string' && window.SUPABASE_URL.startsWith('http')
    && typeof window.SUPABASE_ANON_KEY==='string' && window.SUPABASE_ANON_KEY.length>20;
}

// -------- CARGA DE DATOS DESDE SUPABASE --------
async function loadAllData(){
  const [p,l,s,t,a,n] = await Promise.all([
    sb.from('profiles').select('*').order('full_name'),
    sb.from('leads').select('*').order('created_at',{ascending:false}),
    sb.from('sales').select('*').order('created_at',{ascending:false}),
    sb.from('tasks').select('*').order('created_at',{ascending:false}),
    sb.from('activities').select('*').order('created_at',{ascending:false}),
    sb.from('notes').select('*').order('created_at',{ascending:false}),
  ]);
  PROFILES = p.data||[];
  DB.leads = l.data||[]; DB.sales = s.data||[]; DB.tasks = t.data||[];
  DB.activities = a.data||[]; DB.notes = n.data||[];
}

// Helpers de escritura (devuelven promesa; muestran error si falla)
async function dbInsert(table,row){ const {data,error}=await sb.from(table).insert(row).select(); if(error){toast('Error: '+error.message);return null;} return data?data[0]:null; }
async function dbUpdate(table,id,patch){ const {error}=await sb.from(table).update(patch).eq('id',id); if(error)toast('Error: '+error.message); }
async function dbDelete(table,id){ const {error}=await sb.from(table).delete().eq('id',id); if(error)toast('Error: '+error.message); }
async function refresh(rerender){ await loadAllData(); if(rerender!==false && !document.querySelector('.modal-bg')) go(currentPage); }

// -------- HELPERS --------
function userById(id){ return PROFILES.find(u=>u.id===id); }
function userName(id){ const u=userById(id); return u?u.full_name:'—'; }
function initials(name){ return (name||'?').split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2); }
function money(n){ return '$'+Math.round(n||0).toLocaleString('es-AR'); }
function fdate(s){ if(!s)return '—'; const d=new Date(s); return d.toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric'}); }
function fdatetime(s){ const d=new Date(s); return d.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}); }
function isAdmin(){ return SESSION && SESSION.role==='admin'; }
function visibleLeads(){ return isAdmin()? DB.leads : DB.leads.filter(l=>l.vendedor_id===SESSION.id); }
function visibleSales(){ return isAdmin()? DB.sales : DB.sales.filter(s=>s.vendedor_id===SESSION.id); }
function visibleTasks(){ return isAdmin()? DB.tasks : DB.tasks.filter(t=>t.user_id===SESSION.id); }
function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2600); }

function pickInitialUser(){
  const saved = localStorage.getItem('crm_current');
  if(saved){ const p = PROFILES.find(x=>x.id===saved); if(p) return p; }
  // por defecto: el admin (ve todo); si no hay, el primero
  return PROFILES.find(p=>p.role==='admin') || PROFILES[0] || {id:null,full_name:'Invitado',role:'admin'};
}
function setCurrentUser(id){
  const p = PROFILES.find(x=>x.id===id); if(!p) return;
  SESSION = p; localStorage.setItem('crm_current', id);
  document.getElementById('userMenu').classList.add('hidden');
  refreshUserChip(); buildNav(); go('dashboard');
}
function refreshUserChip(){
  document.getElementById('userAvatar').textContent = initials(SESSION.full_name);

// -------- NOTIFICACIONES --------
let notifsOpen = false;
let notifConfirmClear = false;
function dismKey(){ return 'crm_dismissed_notifs_' + (SESSION && SESSION.id ? SESSION.id : 'anon'); }
function getDismissedNotifs(){ try{ return JSON.parse(localStorage.getItem(dismKey())||'[]'); }catch(e){ return []; } }
function setDismissedNotifs(a){ localStorage.setItem(dismKey(), JSON.stringify(a)); }
function buildNotifs(){
  const out = [];
  const today = new Date(new Date().toDateString());
  visibleTasks().filter(t=>!t.completada && t.fecha_vencimiento).forEach(t=>{
    const due = new Date(t.fecha_vencimiento+'T00:00:00');
    const lead = t.lead_id ? DB.leads.find(l=>l.id===t.lead_id) : null;
    const extra = (t.hora?(' · '+t.hora):'') + (lead?(' · '+lead.nombre+' '+lead.apellido):'');
    if(due < today){
      out.push({id:'task-overdue-'+t.id, tipo:'overdue', titulo:'Tarea vencida: '+t.titulo, desc:'Venció el '+fdate(t.fecha_vencimiento)+extra, leadId:t.lead_id});
    } else if(due.getTime()===today.getTime()){
      out.push({id:'task-today-'+t.id, tipo:'today', titulo:'Tarea para hoy: '+t.titulo, desc:'Hoy'+extra, leadId:t.lead_id});
    }
  });
  const dis = getDismissedNotifs();
  return out.filter(n=>!dis.includes(n.id));
}
function updateNotifBadge(){
  const b = document.getElementById('notifBadge'); if(!b) return;
  const n = buildNotifs().length;
  if(n>0){ b.textContent = n>9?'9+':String(n); b.classList.remove('hidden'); }
  else b.classList.add('hidden');
}
function toggleNotifs(ev){
  if(ev) ev.stopPropagation();
  const p = document.getElementById('notifPanel');
  notifsOpen = !notifsOpen;
  notifConfirmClear = false;
  if(!notifsOpen){ p.classList.add('hidden'); return; }
  renderNotifPanel();
  p.classList.remove('hidden');
}
function renderNotifPanel(){
  const p = document.getElementById('notifPanel'); if(!p) return;
  const items = buildNotifs();
  const ico = (tipo)=> tipo==='overdue'
    ? `<div class="ni-ico" style="background:rgba(239,68,68,.12);color:var(--red)">${svg(I.bell)}</div>`
    : `<div class="ni-ico" style="background:var(--brand-50);color:var(--brand-600)">${svg(I.calendar)}</div>`;
  const head = notifConfirmClear
    ? `<div class="notif-confirm"><p>¿Seguro que querés eliminar todas las notificaciones?</p>
        <div class="row"><button class="nc-no" onclick="cancelClearNotifs(event)">Cancelar</button>
        <button class="nc-yes" onclick="confirmClearNotifs(event)">Eliminar</button></div></div>`
    : `<div class="notif-head"><h4>Notificaciones</h4>${items.length?`<button class="notif-clear" onclick="askClearNotifs(event)">Borrar todas</button>`:''}</div>`;
  p.innerHTML = head +
    `<div class="notif-list">${items.length ? items.map(n=>`<div class="notif-item">
        ${ico(n.tipo)}
        <div class="notif-body" onclick="notifGo('${n.leadId||''}')"><div class="nt">${n.titulo}</div><div class="nd">${n.desc}</div></div>
        <button class="notif-x" title="Borrar" onclick="dismissNotif(event,'${n.id}')">${svg(I.x)}</button>
      </div>`).join('') : `<div class="notif-empty">No tenés notificaciones</div>`}</div>`;
}
function dismissNotif(ev, id){
  if(ev) ev.stopPropagation();
  const dis = getDismissedNotifs(); if(!dis.includes(id)){ dis.push(id); setDismissedNotifs(dis); }
  renderNotifPanel(); updateNotifBadge();
}
function askClearNotifs(ev){ if(ev) ev.stopPropagation(); notifConfirmClear = true; renderNotifPanel(); }
function cancelClearNotifs(ev){ if(ev) ev.stopPropagation(); notifConfirmClear = false; renderNotifPanel(); }
function confirmClearNotifs(ev){
  if(ev) ev.stopPropagation();
  const dis = getDismissedNotifs();
  buildNotifs().forEach(n=>{ if(!dis.includes(n.id)) dis.push(n.id); });
  setDismissedNotifs(dis);
  notifConfirmClear = false;
  renderNotifPanel(); updateNotifBadge();
}
function notifGo(leadId){
  const p = document.getElementById('notifPanel'); if(p) p.classList.add('hidden'); notifsOpen=false;
  if(leadId) openLeadDetail(leadId,'tareas'); else go('tareas');
}
// Cerrar el panel al hacer clic afuera
document.addEventListener('click', (e)=>{
  if(notifsOpen && !e.target.closest('.notif-wrap')){
    const p = document.getElementById('notifPanel'); if(p) p.classList.add('hidden'); notifsOpen=false;
  }
});

const NAV_ITEMS = [
  {id:'dashboard', label:'Dashboard', icon:I.dash},
  {id:'pipeline',  label:'Pipeline',  icon:I.pipe},
  {id:'leads',     label:'Leads',     icon:I.users},
  {id:'tareas',    label:'Tareas',    icon:I.check},
  {id:'calendario',label:'Calendario',icon:I.calendar},
  {id:'comisiones',label:'Comisiones',icon:I.dollar},
  {id:'equipo',    label:'Equipo',    icon:I.team},
  {id:'config',    label:'Configuración', icon:I.cog, admin:true},
];
function buildNav(){
  const nav = document.getElementById('nav');
  nav.innerHTML = NAV_ITEMS.filter(n=>!n.admin || isAdmin()).map(n=>
    `<a data-page="${n.id}" onclick="go('${n.id}')">${svg(n.icon)}${n.label}</a>`
  ).join('');
}
function go(page){
  currentPage = page;
  document.querySelectorAll('.nav a').forEach(a=>a.classList.toggle('active', a.dataset.page===page));
  if(window.innerWidth<=768) closeSidebar();
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={};
  const c = document.getElementById('content');
  c.innerHTML = '';
  if(page==='dashboard') renderDashboard(c);
  else if(page==='pipeline') renderPipeline(c);
  else if(page==='leads') renderLeads(c);
  else if(page==='tareas') renderTareas(c);
  else if(page==='calendario') renderCalendario(c);
  else if(page==='comisiones') renderComisiones(c);
  else if(page==='equipo') renderEquipo(c);
  else if(page==='config') renderConfig(c);
  updateNotifBadge();
}

   DASHBOARD
   ============================================================ */
function computeStats(){
  const leads = visibleLeads(), sales = visibleSales();
  const now = new Date();
  return {
    total: leads.length,
    contactados: leads.filter(l=>l.estado!=='lead_nuevo').length,
    interesados: leads.filter(l=>['interesado','reunion_agendada','propuesta_enviada','negociacion'].includes(l.estado)).length,
    reuniones: leads.filter(l=>l.estado==='reunion_agendada').length,
    propuestas: leads.filter(l=>l.estado==='propuesta_enviada').length,
    ganadas: leads.filter(l=>l.estado==='ganado').length,
    perdidas: leads.filter(l=>l.estado==='perdido').length,
    factTotal: sales.reduce((a,s)=>a+s.monto,0),
    factMes: sales.filter(s=>{const d=new Date(s.fecha_venta); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((a,s)=>a+s.monto,0),
    comisGen: sales.reduce((a,s)=>a+s.comision,0),
    comisPend: sales.filter(s=>s.estado_comision==='pendiente').reduce((a,s)=>a+s.comision,0),
    comisPag: sales.filter(s=>s.estado_comision==='pagada').reduce((a,s)=>a+s.comision,0),
  };
}
function statCard(t,v,icon,color,i){
  return `<div class="card stat anim" style="animation-delay:${i*0.04}s"><div class="ic ic-${color}">${svg(icon)}</div><div><div class="t">${t}</div><div class="v">${v}</div></div></div>`;
}
function renderDashboard(c){
  const s = computeStats();
  c.innerHTML = `
    <div class="page-head"><div><h2>Dashboard</h2><div class="sub">Bienvenido, ${SESSION.full_name.split(' ')[0]} — resumen general</div></div></div>
    <div class="grid kpi-grid" style="margin-bottom:16px">
      ${statCard('Leads Totales',s.total,I.users,'blue',0)}
      ${statCard('Contactados',s.contactados,I.phone,'cyan',1)}
      ${statCard('Interesados',s.interesados,I.users,'purple',2)}
      ${statCard('Reuniones',s.reuniones,I.calendar,'amber',3)}
      ${statCard('Propuestas',s.propuestas,I.fileText,'blue',4)}
      ${statCard('Ventas Cerradas',s.ganadas,I.up,'green',5)}
      ${statCard('Ventas Perdidas',s.perdidas,I.down,'red',6)}
      ${statCard('Facturación Total',money(s.factTotal),I.dollar,'green',7)}
      ${statCard('Facturación Mes',money(s.factMes),I.banknote,'blue',8)}
      ${statCard('Comisiones Total',money(s.comisGen),I.award,'purple',9)}
      ${statCard('Com. Pendientes',money(s.comisPend),I.clock,'amber',10)}
      ${statCard('Com. Pagadas',money(s.comisPag),I.checkCircle,'green',11)}
    </div>
    <div class="grid two-col" style="grid-template-columns:1fr 1fr;margin-bottom:16px">
      <div class="card chart-card anim"><h3>Facturación por Mes</h3><div class="chart-box"><canvas id="chFact"></canvas></div></div>
      <div class="card chart-card anim"><h3>Leads por Mes</h3><div class="chart-box"><canvas id="chLeads"></canvas></div></div>
    </div>
    <div class="grid two-col" style="grid-template-columns:2fr 1fr;margin-bottom:16px">
      <div class="card chart-card anim"><h3>Facturación por Vendedor</h3><div class="chart-box"><canvas id="chVend"></canvas></div></div>
      <div class="card chart-card anim"><h3>Embudo de Ventas</h3><div class="chart-box"><canvas id="chFunnel"></canvas></div></div>
    </div>
    <div class="card chart-card anim"><h3>Conversión por Vendedor (%)</h3><div class="chart-box" style="height:180px"><canvas id="chConv"></canvas></div></div>
  `;
  drawDashboardCharts();
}
function monthsData(){
  const leads = visibleLeads(), sales = visibleSales();
  const arr = [];
  for(let i=5;i>=0;i--){
    const d = new Date(); d.setMonth(d.getMonth()-i);
    const key = d.toLocaleString('es-AR',{month:'short'});
    const m=d.getMonth(), y=d.getFullYear();
    arr.push({
      mes:key,
      leads: leads.filter(l=>{const x=new Date(l.created_at);return x.getMonth()===m&&x.getFullYear()===y;}).length,
      fact: sales.filter(s=>{const x=new Date(s.fecha_venta);return x.getMonth()===m&&x.getFullYear()===y;}).reduce((a,s)=>a+s.monto,0)
    });
  }
  return arr;
}
function vendorData(){
  const ids = isAdmin()? vendedorIds() : [SESSION.id];
  return ids.map(id=>{
    const ls = DB.leads.filter(l=>l.vendedor_id===id);
    const ss = DB.sales.filter(s=>s.vendedor_id===id);
    const won = ls.filter(l=>l.estado==='ganado').length;
    return {name:userName(id).split(' ')[0], fact:ss.reduce((a,s)=>a+s.monto,0), ventas:won, conv: ls.length?Math.round(won/ls.length*100):0};
  });
}
function chartColors(){
  const dark = document.body.classList.contains('dark');
  return {grid: dark?'#2A2A3A':'#eee', text: dark?'#9494B0':'#666'};
}
function drawDashboardCharts(){
  const md = monthsData(), vd = vendorData(), cc = chartColors();
  const palette = ['#0D2F73','#2563EB','#10B981','#F59E0B','#EF4444','#8B5CF6','#06B6D4','#F97316'];
  Chart.defaults.font.family = 'Inter';
  Chart.defaults.color = cc.text;
  charts.fact = new Chart(document.getElementById('chFact'),{type:'line',
    data:{labels:md.map(m=>m.mes),datasets:[{label:'Facturación',data:md.map(m=>m.fact),borderColor:'#0D2F73',backgroundColor:'rgba(13,47,115,.12)',fill:true,tension:.35,borderWidth:2,pointRadius:3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:cc.grid}},y:{grid:{color:cc.grid},ticks:{callback:v=>'$'+(v/1000)+'k'}}}}});
  charts.leads = new Chart(document.getElementById('chLeads'),{type:'bar',
    data:{labels:md.map(m=>m.mes),datasets:[{label:'Leads',data:md.map(m=>m.leads),backgroundColor:'#2563EB',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:cc.grid},beginAtZero:true}}}});
  charts.vend = new Chart(document.getElementById('chVend'),{type:'bar',
    data:{labels:vd.map(v=>v.name),datasets:[{label:'Facturación',data:vd.map(v=>v.fact),backgroundColor:'#0D2F73',borderRadius:6}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:cc.grid},ticks:{callback:v=>'$'+(v/1000)+'k'}},y:{grid:{display:false}}}}});
  const fd = Object.keys(ESTADOS).map(e=>({l:ESTADOS[e],c:visibleLeads().filter(l=>l.estado===e).length})).filter(x=>x.c>0);
  charts.funnel = new Chart(document.getElementById('chFunnel'),{type:'doughnut',
    data:{labels:fd.map(f=>f.l),datasets:[{data:fd.map(f=>f.c),backgroundColor:palette,borderWidth:0}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{boxWidth:10,font:{size:10}}}},cutout:'55%'}});
  charts.conv = new Chart(document.getElementById('chConv'),{type:'bar',
    data:{labels:vd.map(v=>v.name),datasets:[{label:'Conversión %',data:vd.map(v=>v.conv),backgroundColor:'#10B981',borderRadius:6}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{grid:{color:cc.grid},beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}}}});
}

/* ============================================================
   PIPELINE (Kanban drag & drop)
   ============================================================ */
let dragLeadId = null;
function renderPipeline(c){
  c.innerHTML = `
    <div class="page-head"><div><h2>Pipeline</h2><div class="sub">Arrastrá las tarjetas para cambiar el estado</div></div>
      <button class="btn btn-primary" onclick="openLeadForm()">${svg(I.plus)}Nuevo Lead</button></div>
    <div class="pipeline" id="pipeline"></div>`;
  drawPipeline();
}
function drawPipeline(){
  const cont = document.getElementById('pipeline');
  const leads = visibleLeads();
  cont.innerHTML = Object.keys(ESTADOS).map(est=>{
    const col = leads.filter(l=>l.estado===est);
    const total = col.reduce((a,l)=>a+(l.monto_presupuestado||0),0);
    return `<div class="pcol" data-estado="${est}"
        ondragover="event.preventDefault();this.classList.add('drop-target')"
        ondragleave="this.classList.remove('drop-target')"
        ondrop="dropLead(event,'${est}')">
      <div class="pcol-head">
        <div><h4>${ESTADOS[est]}</h4>${total>0?`<div class="money">${money(total)}</div>`:''}</div>
        <span class="pcol-count">${col.length}</span>
      </div>
      <div class="pcol-body">
        ${col.map(l=>pipeCard(l)).join('') || '<div class="drop-empty">Arrastrá aquí</div>'}
      </div>
    </div>`;
  }).join('');
}
function pipeCard(l){
  return `<div class="pcard" draggable="true" ondragstart="dragStart(event,'${l.id}')" ondragend="this.classList.remove('dragging')" onclick="openLeadDetail('${l.id}')">
    <div class="top"><div class="avatar">${initials(l.nombre+' '+l.apellido)}</div>
      <div style="min-width:0"><div class="nm">${l.nombre} ${l.apellido}</div>${l.empresa?`<div class="co">${l.empresa}</div>`:''}</div></div>
    ${l.producto_ofrecido?`<div class="prod">${PRODUCTOS[l.producto_ofrecido].label}</div>`:''}
    ${l.monto_presupuestado?`<div class="amt">${money(l.monto_presupuestado)}</div>`:''}
    <div class="co" style="margin-top:4px">${userName(l.vendedor_id).split(' ')[0]}</div>
  </div>`;
}
function dragStart(e,id){ dragLeadId=id; e.target.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
async function dropLead(e,estado){
  e.preventDefault();
  document.querySelectorAll('.pcol').forEach(p=>p.classList.remove('drop-target'));
  const id = dragLeadId; dragLeadId=null;
  const lead = DB.leads.find(l=>l.id===id);
  if(lead && lead.estado!==estado){
    lead.estado=estado; drawPipeline(); // optimista
    await dbUpdate('leads',id,{estado, updated_at:new Date().toISOString()});
    await dbInsert('activities',{lead_id:id,user_id:SESSION.id,tipo:'estado',descripcion:'Estado cambiado a '+ESTADOS[estado]});
    await loadAllData(); drawPipeline(); toast('Movido a '+ESTADOS[estado]);
  }
}

function renderLeads(c){

      <div style="display:flex;gap:8px;flex-wrap:wrap">

    <div class="card filters">
      <div class="field"><label>Buscar</label><input id="fSearch" placeholder="Nombre, empresa, email..." oninput="leadFilters.search=this.value;drawLeadsTable()" value="${leadFilters.search}"></div>
      <div class="field"><label>Estado</label><select id="fEstado" onchange="leadFilters.estado=this.value;drawLeadsTable()">
        <option value="">Todos</option>${Object.keys(ESTADOS).map(e=>`<option value="${e}" ${leadFilters.estado===e?'selected':''}>${ESTADOS[e]}</option>`).join('')}</select></div>

    </div>
    <div class="card" style="overflow:hidden"><div style="overflow-x:auto"><table id="leadsTable"></table></div></div>`;

function filteredLeads(){
  let ls = visibleLeads();
  const f = leadFilters;
  if(f.estado) ls=ls.filter(l=>l.estado===f.estado);
  if(f.vendedor) ls=ls.filter(l=>l.vendedor_id===f.vendedor);
  if(f.search){const q=f.search.toLowerCase(); ls=ls.filter(l=>(`${l.nombre} ${l.apellido} ${l.empresa||''} ${l.email||''} ${l.whatsapp||''} ${l.instagram||''}`).toLowerCase().includes(q));}
  return ls.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
}
function drawLeadsTable(){
  const ls = filteredLeads();
  document.getElementById('leadCount').textContent = ls.length+' registros';
  const t = document.getElementById('leadsTable');
  t.innerHTML = `<thead><tr>
    <th>Lead</th><th class="hide-sm">Empresa</th><th class="hide-sm">Contacto</th><th>Estado</th>
    <th class="hide-sm">Vendedor</th><th class="hide-sm">Producto</th><th class="hide-sm">Monto</th><th class="hide-sm">Fecha</th>
  </tr></thead><tbody>${ls.length? ls.map(l=>`
    <tr onclick="openLeadDetail('${l.id}')">

function exportCSV(){
  const ls = filteredLeads();
  const headers=['Nombre','Apellido','Empresa','WhatsApp','Email','Instagram','Estado','Vendedor','Producto','Monto','Fecha'];
  const rows = ls.map(l=>[l.nombre,l.apellido,l.empresa||'',l.whatsapp||'',l.email||'',l.instagram||'',ESTADOS[l.estado],userName(l.vendedor_id),l.producto_ofrecido?PRODUCTOS[l.producto_ofrecido].label:'',l.monto_presupuestado||'',fdate(l.created_at)]);
  const csv = [headers,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='leads_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
  toast('CSV exportado');
}

async function saveLead(id){
  const nombre=val('f_nombre'), apellido=val('f_apellido');
  if(!nombre||!apellido){ toast('Nombre y Apellido son obligatorios'); return; }
  const data = {
    nombre, apellido, empresa:val('f_empresa')||null, rubro:val('f_rubro')||null, whatsapp:val('f_whatsapp')||null,
    email:val('f_email')||null, instagram:val('f_instagram')||null, facebook:val('f_facebook')||null, sitio_web:val('f_sitio_web')||null,
    ciudad:val('f_ciudad')||null, provincia:val('f_provincia')||null, estado:val('f_estado'), metodo_contacto:val('f_metodo')||null,
    producto_ofrecido:val('f_producto')||null, monto_presupuestado:val('f_monto')?Number(val('f_monto')):null,
    probabilidad_cierre:val('f_prob')?Number(val('f_prob')):null,
    vendedor_id: (isAdmin()? val('f_vendedor') : SESSION.id)||null, observaciones:val('f_obs')||null, updated_at:new Date().toISOString()
  };
  if(id){
    await dbUpdate('leads',id,data);
    await dbInsert('activities',{lead_id:id,user_id:SESSION.id,tipo:'editado',descripcion:'Lead editado'});
    toast('Lead actualizado');
  } else {
    const ins = await dbInsert('leads',{...data, fecha_carga:new Date().toISOString()});
    if(ins) await dbInsert('activities',{lead_id:ins.id,user_id:SESSION.id,tipo:'creado',descripcion:'Lead creado'});
    toast('Lead creado');
  }
  document.querySelector('.modal-bg').remove();
  await refresh();
}

function fullTaskRow(t){

function pad2(n){ return String(n).padStart(2,'0'); }
function hm(h){ return h ? String(h).slice(0,5) : ''; }

/* ---- Acciones Tarea <-> Calendario ---- */
function calActions(t, leadId){
  const ref = leadId ? `'${leadId}'` : 'null';
  if(t.fecha_vencimiento){
    return `<button class="cal-tag" onclick="event.stopPropagation();viewInCalendar('${t.id}')" title="Ver en calendario">${svg(I.calendar)}<span>En calendario</span></button>
      <button class="icon-btn cal-rm" style="width:30px;height:30px" onclick="event.stopPropagation();removeFromCalendar('${t.id}',${ref})" title="Quitar del calendario">${svg(I.calMinus)}</button>`;
  }
  return `<button class="cal-add" onclick="event.stopPropagation();openCalAdd('${t.id}',${ref})" title="Agregar al calendario">${svg(I.calPlus)}<span>Agregar al calendario</span></button>`;
}
function viewInCalendar(taskId){
  const t = DB.tasks.find(x=>x.id===taskId); if(!t||!t.fecha_vencimiento) return;
  const [y,m] = t.fecha_vencimiento.split('-').map(Number);
  calRef = new Date(y, m-1, 1); calSel = t.fecha_vencimiento;
  go('calendario');
}

  const t = DB.tasks.find(x=>x.id===taskId); if(!t) return;
  const ref = (leadId && leadId!=='null') ? `'${leadId}'` : 'null';
  const modal = document.createElement('div'); modal.className='modal-bg'; modal.onclick=e=>{if(e.target===modal)modal.remove();};

/* ============================================================
   CALENDARIO  (vista mensual de tareas agendadas)
   ============================================================ */
function todayStr(){ const d=new Date(); return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function dateStr(d){ return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`; }
function fdateLong(ds){ const [y,m,d]=ds.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'}); }
let calRef = (()=>{ const d=new Date(); return new Date(d.getFullYear(), d.getMonth(), 1); })();
let calSel = todayStr();
function calShift(n){ calRef = new Date(calRef.getFullYear(), calRef.getMonth()+n, 1); renderCalendario(document.getElementById('content')); }
function calToday(){ const d=new Date(); calRef=new Date(d.getFullYear(), d.getMonth(), 1); calSel=todayStr(); renderCalendario(document.getElementById('content')); }
function calSelect(ds){ calSel=ds; renderCalendario(document.getElementById('content')); }
function renderCalendario(c){
  const y=calRef.getFullYear(), m=calRef.getMonth();
  const monthName = calRef.toLocaleString('es-AR',{month:'long',year:'numeric'});
  const startDow = (new Date(y,m,1).getDay()+6)%7; // Lunes = 0
  const start = new Date(y, m, 1-startDow);
  const byDay = {};
  visibleTasks().filter(t=>t.fecha_vencimiento).forEach(t=>{ (byDay[t.fecha_vencimiento]=byDay[t.fecha_vencimiento]||[]).push(t); });
  Object.values(byDay).forEach(arr=>arr.sort((a,b)=>(a.hora||'99').localeCompare(b.hora||'99')));
  const dows = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const todayS = todayStr();
  let cells = '';
  for(let i=0;i<42;i++){
    const d = new Date(start); d.setDate(start.getDate()+i);
    const ds = dateStr(d);
    const evs = byDay[ds] || [];
    const chips = evs.slice(0,3).map(t=>`<div class="cal-ev ${t.prioridad} ${t.completada?'done':''}" title="${escAttr((t.hora?hm(t.hora)+' ':'')+t.titulo)}">${t.hora?hm(t.hora)+' ':''}${t.titulo}</div>`).join('');
    const more = evs.length>3 ? `<div class="cal-more">+${evs.length-3} más</div>` : '';
    const dots = evs.slice(0,5).map(t=>`<span class="cal-dot ${t.prioridad}"></span>`).join('');
    cells += `<div class="cal-cell ${d.getMonth()!==m?'other':''} ${ds===todayS?'today':''} ${ds===calSel?'sel':''}" onclick="calSelect('${ds}')">
        <span class="cal-daynum">${d.getDate()}</span>
        <div class="cal-evs">${chips}${more}</div>
        <div class="cal-dots">${dots}</div>
      </div>`;
  }
  const selTasks = byDay[calSel] || [];
  c.innerHTML = `
    <div class="page-head"><div><h2>Calendario</h2><div class="sub">Tareas agendadas del equipo</div></div>
      <button class="btn btn-primary" onclick="openTaskForm()">${svg(I.plus)}Nueva Tarea</button></div>
    <div class="card" style="padding:16px">
      <div class="cal-toolbar">
        <div class="cal-nav">
          <button class="icon-btn" onclick="calShift(-1)" title="Mes anterior">${svg(I.back)}</button>
          <div class="cal-title">${monthName}</div>
          <button class="icon-btn" onclick="calShift(1)" title="Mes siguiente">${svg(I.fwd)}</button>
        </div>
        <button class="btn btn-secondary btn-sm" onclick="calToday()">Hoy</button>
      </div>
      <div class="cal-grid">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}${cells}</div>
    </div>
    <div class="cal-agenda">
      <div class="form-section-title" style="margin-bottom:12px;text-transform:capitalize">${fdateLong(calSel)}</div>
      ${selTasks.length ? `<div style="display:flex;flex-direction:column;gap:8px">${selTasks.map(t=>fullTaskRow(t)).join('')}</div>`
                        : `<div class="card empty">No hay tareas para este día</div>`}
    </div>`;
}

  box.innerHTML = res.length? res.map(l=>`<div class="item" onclick="openLeadDetail('${l.id}');hideSearch();document.getElementById('globalSearch').value=''">
    <div class="avatar" style="width:32px;height:32px;font-size:11px">${initials(l.nombre+' '+l.apellido)}</div>
    <div><div style="font-weight:600;font-size:13px">${l.nombre} ${l.apellido}</div>${l.empresa?`<div style="font-size:12px;color:var(--muted)">${l.empresa}</div>`:''}</div></div>`).join('') : '<div class="item" style="cursor:default;color:var(--muted)">Sin resultados</div>';
}
function hideSearch(){ document.getElementById('searchResults').innerHTML=''; }

/* ============================================================
   INIT
   ============================================================ */
(function init(){
  // tema
  const theme = localStorage.getItem('crm_theme');
  if(theme==='light') document.body.classList.remove('dark');
  document.getElementById('themeIcon').innerHTML = document.body.classList.contains('dark')
    ? '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>'
    : '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';

  if(!supaReady()){
    document.getElementById('setupNotice').classList.remove('hidden');
    return;
  }

  sb = window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

  // Entra directo: carga datos, elige usuario actual y muestra el CRM
  loadAllData().then(()=>{
    SESSION = pickInitialUser();
    subscribeRealtime();
    startApp();
  });
})();
</script>
